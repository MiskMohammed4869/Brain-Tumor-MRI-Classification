    <pattern id="scanLines" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 0 0 H 8" stroke="#e2e8f0" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

