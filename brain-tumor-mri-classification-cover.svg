<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Brain Tumor MRI Classification Project Cover</title>
  <desc id="desc">A medical AI cover showing brain MRI classification with custom CNN, pretrained models, metrics, and an app preview.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101319"/>
      <stop offset="0.48" stop-color="#151b23"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f2933" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0f1720" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ee7f9"/>
      <stop offset="1" stop-color="#0ea5b7"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd166"/>
      <stop offset="1" stop-color="#f59e0b"/>
