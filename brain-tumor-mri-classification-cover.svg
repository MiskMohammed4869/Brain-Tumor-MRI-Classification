    <linearGradient id="magenta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0abfc"/>
      <stop offset="1" stop-color="#d946ef"/>
    </linearGradient>
    <radialGradient id="mriGlow" cx="50%" cy="45%" r="62%">
      <stop offset="0" stop-color="#cbd5e1" stop-opacity="0.34"/>
      <stop offset="0.5" stop-color="#38bdf8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.38"/>
